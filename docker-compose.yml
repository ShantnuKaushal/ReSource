version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: resource_db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=resource_db
    volumes:
      - resource_postgres_data:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: resource_api
    ports:
      - "5000:5000"
    environment:
      # Inside Docker, the DB address is the name of the service: "db"
      - DATABASE_URL=postgresql://user:password@db:5432/resource_db
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      - db

volumes:
  resource_postgres_data: